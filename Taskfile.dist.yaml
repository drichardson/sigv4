# https://taskfile.dev
version: "3"

tasks:
  test:
    desc: Run tests with coverage
    cmd: uv run pytest
    
  test:lowest:
    desc: Run tests against lowest direct dependencies
    cmd: uv run --resolution lowest-direct pytest

  lint:
    desc: Check formatting and lint
    cmd: uv run ruff format --check && uv run ruff check

  format:
    desc: Format code
    cmd: uv run ruff format

  typecheck:
    desc: Run mypy type checker
    cmd: uv run mypy src tests

  check-deps:
    desc: Enforce zero Python package runtime dependencies
    cmd: scripts/check-no-runtime-deps.sh

  check:
    desc: Run all checks (test, lint, typecheck, check-deps)
    deps: [test, lint, typecheck, check-deps]
