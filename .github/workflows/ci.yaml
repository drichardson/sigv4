name: ci

on: [push]

jobs:
  tests:
    runs-on: ubuntu-latest

    continue-on-error: ${{ matrix.experimental }}

    strategy:
      matrix:
        python-version: ["3.14"]
        resolution: ["locked", "lowest-direct"]
        experimental: [false]
        include:
          - python-version: "3.15"
            resolution: "locked"
            experimental: true

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ matrix.python-version }}

    - name: Run Tests
      run: uv run ${{ matrix.resolution == 'lowest-direct' && '--resolution lowest-direct' || '' }} pytest

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report-${{ matrix.python-version }}-${{ matrix.resolution }}
        path: htmlcov/

    - name: Coverage summary on PR
      uses: orgoro/coverage@v3.2
      if: github.event_name == 'pull_request' && matrix.python-version == '3.14' && matrix.resolution == 'locked'
      with:
        coverageFile: coverage.xml
        token: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Formatting and checks
      run: |
        uv run ruff format --check
        uv run ruff check

    - name: Check Types
      run: uv run mypy src tests

    - name: Check no runtime dependencies
      run: scripts/check-no-runtime-deps.sh

  check:
    if: always()

    needs:
      - tests
      - lint

    runs-on: ubuntu-latest

    steps:
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@release/v1
      with:
        jobs: ${{ toJSON(needs) }}
