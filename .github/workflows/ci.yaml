name: ci

on: [push]

env:
  UV_NO_PROGRESS: "1"

jobs:
  tests:
    runs-on: ubuntu-latest

    continue-on-error: ${{ matrix.experimental }}

    strategy:
      matrix:
        python-version: ["3.14"]
        resolution: ["locked", "lowest-direct"]
        experimental: [false]
        include:
          - python-version: "3.15"
            resolution: "locked"
            experimental: true

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install go-task
      uses: arduino/setup-task@v2

    - name: Run Tests
      run: task test
      env:
        UV_RESOLUTION: ${{ matrix.resolution == 'lowest-direct' && 'lowest-direct' || '' }}

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always() && matrix.python-version == '3.14' && matrix.resolution == 'locked'
      with:
        name: coverage-report
        path: htmlcov/

    - name: Coverage summary on PR
      uses: orgoro/coverage@v3.2
      if: github.event_name == 'pull_request' && matrix.python-version == '3.14' && matrix.resolution == 'locked'
      with:
        coverageFile: coverage.xml
        token: ${{ secrets.GITHUB_TOKEN }}

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install go-task
      uses: arduino/setup-task@v2

    - name: Formatting and checks
      run: task lint

    - name: Check Types
      run: task typecheck

    - name: Check no runtime dependencies
      run: task check-deps

  check:
    if: always()

    needs:
      - tests
      - lint

    runs-on: ubuntu-latest

    steps:
    - name: Decide whether the needed jobs succeeded or failed
      uses: re-actors/alls-green@release/v1
      with:
        jobs: ${{ toJSON(needs) }}
